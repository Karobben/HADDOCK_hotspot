# Region-guided docking using AIRs on receptor hotspots
run_dir = "results/run_region1"
mode = "local"
ncores = 1

molecules = [
    "data/receptor_single.pdb",
    "data/ligand_single.pdb"
    ]

[topoaa]

[rigidbody]
ambig_fname = "restraints/air_all.tbl"
unambig_fname = "restraints/intra_lig_lock.tbl"
sampling = 2
mol_fix_origin_1 = false
mol_fix_origin_2 = false

[flexref]
ambig_fname = "restraints/air_all.tbl"
unambig_fname = "restraints/intra_lig_lock.tbl"
mol_fix_origin_1 = false
mol_fix_origin_2 = false

[emref]
ambig_fname = "restraints/air_all.tbl"
unambig_fname = "restraints/intra_lig_lock.tbl"
mol_fix_origin_1 = false
mol_fix_origin_2 = false
